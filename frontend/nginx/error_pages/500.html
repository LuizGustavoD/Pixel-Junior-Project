<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Erro Interno - Pixel Driver</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0d0c12;
            --bg-card: rgba(22, 20, 30, 0.7);
            --border: rgba(117, 76, 227, 0.2);
            --accent: #754CE3;
            --accent-hover: #5d3bc4;
            --text: #c0bdce;
            --text-h: #ffffff;
            --shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.50);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
            overflow: hidden;
            position: relative;
        }

        body::before {
            content: '';
            position: absolute;
            width: 300px;
            height: 300px;
            background: var(--accent);
            filter: blur(150px);
            border-radius: 50%;
            top: 20%;
            left: 10%;
            opacity: 0.15;
            z-index: -1;
        }

        body::after {
            content: '';
            position: absolute;
            width: 300px;
            height: 300px;
            background: var(--accent);
            filter: blur(150px);
            border-radius: 50%;
            bottom: 20%;
            right: 10%;
            opacity: 0.15;
            z-index: -1;
        }

        .card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 40px;
            max-width: 480px;
            width: 100%;
            text-align: center;
            box-shadow: var(--shadow);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            animation: cardFadeIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }

        .error-code {
            font-family: 'Outfit', sans-serif;
            font-size: 96px;
            font-weight: 700;
            background: linear-gradient(135deg, #a78bfa, var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            line-height: 1;
            margin-bottom: 16px;
        }

        .error-title {
            font-family: 'Outfit', sans-serif;
            font-size: 24px;
            font-weight: 600;
            color: var(--text-h);
            margin-bottom: 12px;
        }

        .error-message {
            font-size: 15px;
            line-height: 1.6;
            margin-bottom: 30px;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background-color: var(--accent);
            color: #ffffff;
            font-family: 'Outfit', sans-serif;
            font-size: 16px;
            font-weight: 500;
            padding: 12px 28px;
            border-radius: 8px;
            text-decoration: none;
            cursor: pointer;
            transition: all 0.25s ease;
            box-shadow: 0 4px 12px rgba(117, 76, 227, 0.3);
        }

        .btn:hover {
            background-color: var(--accent-hover);
            transform: translateY(-1px);
            box-shadow: 0 6px 16px rgba(117, 76, 227, 0.4);
        }

        .btn:active {
            transform: translateY(0);
        }

        @keyframes cardFadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="error-code">500</div>
        <h1 class="error-title">Erro Interno do Servidor</h1>
        <p class="error-message">Ops! Ocorreu um problema inesperado no servidor. Nossa equipe técnica já foi notificada.</p>
        <a href="/" class="btn">Voltar para o Pixel Driver</a>
    </div>
</body>
</html>
